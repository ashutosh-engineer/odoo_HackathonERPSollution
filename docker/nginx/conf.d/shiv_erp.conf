# ============================================================
# Shiv ERP — Nginx Virtual Host (HTTP only, no SSL)
# SSL can be added later when certificate is available
# ============================================================

server {
    listen 80;
    server_name _;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Connection limits ─────────────────────────────────────
    limit_conn conn_limit 20;

    # ── Login endpoint — strict rate limiting ─────────────────
    location /shiv/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://odoo;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── API endpoints — standard rate limiting ────────────────
    location /shiv/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://odoo;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Longpolling (WebSocket/chat) ──────────────────────────
    location /longpolling/ {
        proxy_pass http://odoo_longpoll;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Static files — cached aggressively ───────────────────
    location ~* /web/static/ {
        proxy_cache_valid 200 90d;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Status endpoint — shows server is live ───────────────
    location = /status {
        access_log off;
        default_type application/json;
        return 200 '{"status":"live","message":"Shiv Furniture Works ERP Backend is running","timestamp":"$msec"}';
    }

    # ── Health check (no logging) ─────────────────────────────
    location /web/health {
        access_log off;
        proxy_pass http://odoo;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── All other Odoo routes ─────────────────────────────────
    location / {
        proxy_pass http://odoo;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
