[options]
; ============================================================
; Shiv Furniture Works ERP — Odoo 16 Configuration
; ============================================================

; --- Database ---
db_host = pgbouncer
db_port = 5432
db_user = shiv_odoo
db_password = ShivSecure@2024
db_name = shiv_furniture_erp
db_maxconn = 64

; --- Addons ---
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; --- Server ---
http_interface = 0.0.0.0
http_port = 8069
longpolling_port = 8072
proxy_mode = True
workers = 4
max_cron_threads = 2

; --- Performance ---
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 60
limit_time_real = 120
limit_time_real_cron = 360

; --- Security ---
admin_passwd = ShivMaster@2024
list_db = False

; --- Logging ---
logfile = /var/log/odoo/odoo.log
log_level = info
log_db = False
log_db_level = warning

; --- Session ---
; Sessions stored in Redis via Odoo's session store
; (configured in shiv_auth module)
